<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Galería Multimedia CRUD</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-pink-100 p-8">


<div class="max-w-5xl mx-auto bg-white p-8 rounded-3xl shadow">


<h1 class="text-4xl text-pink-600 font-bold text-center">

🎨 Galería Multimedia

</h1>



<input id="titulo"
class="border p-3 w-full mt-5"
placeholder="Título">



<textarea id="descripcion"
class="border p-3 w-full mt-3"
placeholder="Descripción"></textarea>




<input id="imagen"
type="file"
class="mt-3">



<input id="audio"
type="file"
class="mt-3">





<button onclick="guardar()"
class="bg-pink-500 text-white p-3 rounded mt-4 w-full">

Guardar

</button>



<table class="w-full mt-8">


<tbody id="tabla"></tbody>


</table>



</div>





<script>


const API="https://TU-BACKEND.onrender.com/multimedia";



async function guardar(){


const datos=new FormData();



datos.append(
"titulo",
titulo.value
);


datos.append(
"descripcion",
descripcion.value
);


if(imagen.files[0])

datos.append(
"imagen",
imagen.files[0]
);



if(audio.files[0])

datos.append(
"audio",
audio.files[0]
);




await fetch(API,{

method:"POST",

body:datos

});



mostrar();


}







async function mostrar(){


const res =
await fetch(API);


const datos =
await res.json();



tabla.innerHTML="";



datos.forEach(m=>{


tabla.innerHTML+=`


<tr class="border">


<td>

${m.titulo}

</td>


<td>

${m.descripcion}

</td>



<td>


<button

onclick="eliminar('${m._id}')"

class="bg-red-500 text-white p-2">

Eliminar

</button>


</td>



</tr>


`;


});



}








async function eliminar(id){


await fetch(`${API}/${id}`,{

method:"DELETE"

});


mostrar();


}



mostrar();


</script>



</body>

</html>
