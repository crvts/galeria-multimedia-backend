<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Galería Multimedia CRUD</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-pink-100 p-8">


<div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow">


<h1 class="text-4xl font-bold text-pink-600 text-center mb-6">
🎨 Galería Multimedia CRUD
</h1>



<input 
id="titulo"
class="w-full border p-3 rounded mb-3"
placeholder="Título">



<textarea
id="descripcion"
class="w-full border p-3 rounded mb-3"
placeholder="Descripción">
</textarea>




<label>
Imagen:
</label>

<input 
type="file"
id="imagen"
accept="image/*"
class="mb-3">



<br>



<label>
Audio:
</label>


<input 
type="file"
id="audio"
accept="audio/*"
class="mb-3">



<button 
onclick="guardar()"
class="bg-pink-600 text-white p-3 rounded w-full">

Guardar elemento 💾

</button>




<hr class="my-8">



<h2 class="text-2xl font-bold">
Elementos guardados
</h2>


<div id="lista"></div>



</div>





<script>


const API_URL =
"https://galeria-multimedia-1.onrender.com/multimedia";



let editando=null;





async function guardar(){


const datos = new FormData();



datos.append(
"titulo",
document.getElementById("titulo").value
);



datos.append(
"descripcion",
document.getElementById("descripcion").value
);



datos.append(
"imagen",
document.getElementById("imagen").files[0]
);



datos.append(
"audio",
document.getElementById("audio").files[0]
);





let url = API_URL;


let metodo="POST";



if(editando){


url=`${API_URL}/${editando}`;

metodo="PUT";


}





await fetch(url,{

method:metodo,

body:datos

});



alert("Guardado correctamente");



editando=null;


limpiar();


mostrar();


}







async function mostrar(){


const respuesta =
await fetch(API_URL);



const datos =
await respuesta.json();



lista.innerHTML="";



datos.forEach(e=>{


lista.innerHTML += `


<div class="border p-4 mt-4 rounded">


<h3 class="font-bold text-xl">
${e.titulo}
</h3>


<p>
${e.descripcion}
</p>


<img 
src="${e.imagenUrl}"
width="200">



<audio controls>

<source src="${e.audioUrl}">

</audio>



<br>


<button

onclick="editar('${e._id}',
'${e.titulo}',
'${e.descripcion}')"

class="bg-yellow-400 px-3 py-1 rounded">

Editar

</button>



<button

onclick="eliminar('${e._id}')"

class="bg-red-500 text-white px-3 py-1 rounded">

Eliminar

</button>


</div>


`;


});


}







function editar(id,titulo,descripcion){


document.getElementById("titulo").value=titulo;


document.getElementById("descripcion").value=descripcion;


editando=id;


}







async function eliminar(id){


await fetch(
`${API_URL}/${id}`,
{

method:"DELETE"

});


mostrar();


}







function limpiar(){


titulo.value="";

descripcion.value="";

imagen.value="";

audio.value="";


}




mostrar();



</script>



</body>

</html>
